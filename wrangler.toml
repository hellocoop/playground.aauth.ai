name = "playground-aauth-dev"
main = "src/index.ts"
compatibility_date = "2025-04-01"
# @hellocoop/httpsig references `Buffer` in signature.js (a Node built-in);
# nodejs_compat exposes it at the Worker runtime level.
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "public"

[vars]
ORIGIN = "https://playground.aauth.dev"
AGENT_NAME = "AAuth Playground"

[[kv_namespaces]]
binding = "WEBAUTHN_KV"
id = "8f3528fb8a884a7fa5d6e506ee783eca"

# Custom domain — requires aauth.dev zone in this Cloudflare account
[[routes]]
pattern = "playground.aauth.dev"
custom_domain = true
